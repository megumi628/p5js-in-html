<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SYNTH</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.1/p5.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.1/addons/p5.sound.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: #0e0e12;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: 'Space Mono', monospace;
        color: #555;
        gap: 14px;
      }

      canvas { display: block; }

      .info {
        display: flex;
        justify-content: space-between;
        width: 400px;
        font-size: 11px;
        letter-spacing: 0.1em;
      }

      .info span { color: #c8ff00; }

      .hint {
        font-size: 10px;
        letter-spacing: 0.15em;
        color: #333;
      }
    </style>
  </head>
  <body>
    <div class="info">
      <div>FREQ <span id="disp-freq">— Hz</span></div>
      <div>DELAY <span id="disp-delay">— s</span></div>
    </div>
    <script src="sketch.js"></script>
    <div class="hint">↕ frequency &nbsp;·&nbsp; ↔ delay</div>
  </body>
</html>
